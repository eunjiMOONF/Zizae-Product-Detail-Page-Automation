name: Weekly Hit Product Analysis

on:
  # 매주 월요일 00:00 UTC (한국 시간 09:00)
  schedule:
    - cron: "0 0 * * 1"

  # 수동 실행 가능
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Weekly Hit Product Analysis
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /weekly-hit-product-analysis

            실행 후 결과를 확인하고, Notion 리포트와 Slack 알림이 정상적으로 전송되었는지 검증해주세요.
          claude_args: "--model claude-sonnet-4-5 --max-turns 20"

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs-${{ github.run_number }}
          path: week2-brand-analysis/snapshots/
          retention-days: 90
